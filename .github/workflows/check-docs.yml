name: Check docs

on:
  push:
    paths: ["docs/**", "scripts/*.py", ".claude/skills/*/assets/*", ".github/workflows/check-docs.yml"]
  pull_request:
    paths: ["docs/**", "scripts/*.py", ".claude/skills/*/assets/*", ".github/workflows/check-docs.yml"]

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
      - run: uv run scripts/generate-readmes.py --check
      - run: uv run scripts/check-frontmatter.py
      - run: uv run scripts/check-links.py
