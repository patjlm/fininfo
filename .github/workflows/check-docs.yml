name: Check docs

on:
  push:
    paths: ["docs/**", "scripts/check-*.py", ".claude/skills/*/assets/*-template*.md", ".github/workflows/check-docs.yml"]
  pull_request:
    paths: ["docs/**", "scripts/check-*.py", ".claude/skills/*/assets/*-template*.md", ".github/workflows/check-docs.yml"]

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run scripts/check-links.py
      - run: uv run scripts/check-frontmatter.py
