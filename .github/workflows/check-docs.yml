name: Check docs

on:
  push:
    paths: ["docs/**", "scripts/check-*.py", ".claude/skills/*/assets/*-template*.md"]
  pull_request:
    paths: ["docs/**", "scripts/check-*.py", ".claude/skills/*/assets/*-template*.md"]

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run scripts/check-links.py
      - run: uv run scripts/check-frontmatter.py
