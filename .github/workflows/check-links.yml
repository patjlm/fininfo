name: Check internal links

on:
  push:
    paths: ["docs/**", "scripts/check-links.py"]
  pull_request:
    paths: ["docs/**", "scripts/check-links.py"]

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run scripts/check-links.py
